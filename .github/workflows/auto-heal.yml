name: Auto-heal links

on:
  schedule:
    # Every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'candidates.json'
      - 'scripts/**'
      - '.github/workflows/auto-heal.yml'

permissions:
  contents: write

concurrency:
  group: auto-heal
  cancel-in-progress: false

jobs:
  heal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check current candidates
        run: node scripts/check-links.mjs

      - name: Discover new mirrors for fully-dead sports
        run: node scripts/discover.mjs

      - name: Re-check after discovery
        run: node scripts/check-links.mjs

      - name: Render index.html
        run: node scripts/render.mjs

      - name: Commit if changed
        run: |
          git config user.name "tv-ba-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "auto-heal: refresh links $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
